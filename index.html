<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>

  <!-- <link rel="stylesheet" href="assets/fontawesome/css/all.min.css"> -->
  <link rel="stylesheet" href="assets/css/style.css">

  <link href="assets/fonts/Inter/inter.css" rel="stylesheet">
</head>

<body>

  <!-- Background -->
  <div class="bg-overlay">

    <!-- Video Layer (Base) -->
    <video class="bg-video" autoplay muted loop playsinline preload="auto" poster="assets/poster.jpg">
      <source src="assets/background.mp4" type="video/mp4">
    </video>

    <!-- Depth System -->
    <div class="bg-depth">

      <!-- Primary cinematic light -->
      <div class="bg-light"></div>

      <!-- Dynamic glow spots -->
      <div class="bg-glow bg-glow-1"></div>
      <div class="bg-glow bg-glow-2"></div>

      <!-- Floating particles (cheap effect, high impact) -->
      <div class="bg-particles"></div>

    </div>

    <!-- Color grading layer -->
    <div class="bg-grade"></div>

    <!-- Noise -->
    <div class="bg-noise"></div>

    <!-- Vignette -->
    <div class="bg-vignette"></div>

  </div>

  <!-- Main Container -->
  <div class="container">

    <!-- Top -->
    <header class="top">
      <div class="logo"><img src="assets/logo.png" alt=""></div>
      <div class="title">
        <h1>NOX RolePlay</h1>
        <p>Immersive Experience Redefined</p>
      </div>
    </header>

    <!-- Side Panel -->
    <aside class="side-panel">
      <div class="card">
        <h3>Tips</h3>
        <p id="tipText">Stay in character at all times.</p>
      </div>

      <div class="card">
        <h3>Rules</h3>
        <p>No random deathmatch. Respect others.</p>
      </div>

      <div class="card highlight">
        <h3>Announcement</h3>
        <p>New update coming this week 🚀</p>
      </div>
    </aside>


    <!-- Bottom (UPDATED) -->
    <footer class="bottom">

      <!-- MUSIC -->
      <div class="music-player">
        <div class="music-info">
          <div class="music-title">Now Playing</div>
          <div class="music-track">NOX Ambient Sound</div>
        </div>

        <div class="music-controls">
          <button id="playBtn" class="music-btn">
            <svg viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>

          <button id="muteBtn" class="music-btn">
            <svg viewBox="0 0 24 24">
              <path d="M16.5 12c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM3 9v6h4l5 5V4L7 9H3z" />
            </svg>
          </button>
        </div>

        <div class="music-volume">
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01">
        </div>

        <div class="music-wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <!-- SOCIALS -->
      <div class="socials">
        <a href="#" class="social-item">TeamSpeak</a>
        <a href="#" class="social-item">Website</a>
      </div>

      <!-- NEW: PROGRESS HUD (PRO MOVE) -->
      <div class="loading-hud">

        <div class="loading-meta">
          <span class="loading-status" id="statusText">Connecting to server...</span>
          <span class="loading-percent" id="progressPercent">0%</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="loading-hint">
          <span id="hintText">Initializing rendering pipeline...</span>
        </div>

      </div>

    </footer>
  </div>

  <audio id="bgMusic" src="assets/audio/bg-music.mp3" loop></audio>

  <script src="assets/js/script.js"></script>
</body>

</html>
